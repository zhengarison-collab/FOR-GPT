name: Deploy PTG Web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '.ptg-package/**'
      - '.github/workflows/ptg-web-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore PTG Web package
        run: |
          mkdir -p .build/site
          cat .ptg-package/chunk_* | tr -d '\n\r' | base64 --decode > .build/ptg-web.zip
          unzip -q .build/ptg-web.zip -d .build/site
          test -f .build/site/web/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .build/site/web
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
